patch_pack: 37
title: "Enterprise Stabilization: SQL-backed Tools + Scoped Toolset Self-Heal + Modules-as-Data"
principles:
  - "Policy-as-Data (DB is source of truth for scope/tools/policies)."
  - "C# orchestrates + validates; does not own business policies."
  - "Scoping is an optimization; must never break correctness."

packs:

  - id: 37.01
    priority: P0
    name: "SQL-backed ToolDefinitions (allow stubs in code, schema/instruction in SQL)"
    problem:
      - "AnalyticsModule cannot register tools due to ToolRegistry requiring Instruction/JsonSchema."
      - "ToolCatalogSyncService merges only tools present in ToolRegistry; scoped tools drop to platform-only."
    changes:
      code:
        - file: "src/TILSOFTAI.Orchestration/Tools/ToolDefinition.cs"
          change: |
            Add property:
              bool IsSqlBacked { get; set; } = false;

        - file: "src/TILSOFTAI.Orchestration/Tools/ToolRegistry.cs"
          change: |
            Update Register() validation:
              - Always require Name + Module.
              - If IsSqlBacked == true:
                  allow Instruction/JsonSchema empty at registration time.
                else:
                  keep strict validation (Instruction/JsonSchema required).
              - Keep uniqueness constraint on tool.Name.

        - file: "src/TILSOFTAI.Infrastructure/Tools/ToolCatalogSyncService.cs"
          change: |
            In MergeSqlToolWithModuleTool():
              - If moduleTool.IsSqlBacked:
                  require sqlTool.Instruction + sqlTool.JsonSchema non-empty (SQL is source of truth).
                  If SQL missing -> skip + log warning (do not expose partial tools).
              - Preserve mismatch guard on SpName when moduleTool.SpName is set.

        - file: "src/TILSOFTAI.Modules.Analytics/AnalyticsModule.cs"
          change: |
            Register SQL-backed tool stubs (names + spName, no schema/instruction):
              - catalog_search -> ai_catalog_search
              - catalog_get_dataset -> ai_catalog_get_dataset
              - analytics_validate_plan -> ai_analytics_validate_plan
              - analytics_execute_plan -> ai_analytics_execute_plan
            Mark IsSqlBacked=true.

    acceptance_criteria:
      - "Scoped tool resolution for modules=[analytics] returns analytics tools (not only platform)."
      - "tool.list returns analytics tools as well (when enabled)."
      - "No tool with missing SQL schema/instruction is exposed."

  - id: 37.02
    priority: P0
    name: "Scoped Toolset Self-Heal + Empty Assistant Guard"
    problem:
      - "LLM can stop with content empty and no tool_calls when desired tool is not visible."
      - "OpenWebUI appears hung."
    changes:
      code:
        - file: "src/TILSOFTAI.Orchestration/Pipeline/ChatPipeline.cs"
          change: |
            A) Entity-hint assisted scope widening (LLM-driven, not hard-coded):
              - AnalyticsIntentDetector already runs early.
              - If intent.EntityHint != null:
                  ensure resolvedModules includes that module key (union).
                  Example: entityHint='model' => add 'model' to resolvedModules.

            B) Empty assistant response guard:
              - After each LLM call:
                  if response.ToolCalls.Count == 0 AND string.IsNullOrWhiteSpace(response.Content):
                      do 1 controlled retry:
                        - widen modules by adding entityHint (if any) + keep current
                        - reload scoped tools
                        - add a system nudge: "You MUST either call a tool or return a non-empty answer."
                      if still empty -> Fail with explicit error code "LLM_EMPTY_RESPONSE".

            C) Observability:
              - Log fields: resolvedModules_before, resolvedModules_after, tools_count, nonPlatformTools_count, retry_reason.

    acceptance_criteria:
      - "For query 'tổng số models' (or typo 'tốn số models'), pipeline never returns empty content."
      - "If first scope misses model tools, retry widens scope and succeeds."
      - "No infinite loop; bounded to 1 retry for empty response."

  - id: 37.03
    priority: P0
    name: "Fix routing data (ModuleCatalog instruction) for 'model totals' use-case"
    problem:
      - "ModuleScopeResolver prefers analytics for 'count/total' questions; but in this system the business-fast path is model_count."
    changes:
      sql:
        - file: "sql/patches/patch_37/37_03_update_module_catalog_instruction.sql"
          change: |
            UPDATE dbo.ModuleCatalog
            SET Instruction = 'Product models: dimensions, weight, CBM, pieces, materials, packaging, logistics metrics.
            ALSO use this module for totals/counts of models (e.g., total models in season) using dedicated model tools.'
            WHERE ModuleKey='model' AND Language='en';

            UPDATE dbo.ModuleCatalog
            SET Instruction = N'Sản phẩm model: kích thước, trọng lượng, CBM, pieces, vật liệu, đóng gói, chỉ số logistics.
            DÙNG module này cả cho truy vấn tổng/đếm số lượng model (ví dụ: tổng số model trong mùa) bằng tool chuyên biệt.'
            WHERE ModuleKey='model' AND Language='vi';

    acceptance_criteria:
      - "ModuleScopeResolver more consistently includes 'model' for 'total models' prompts."

  - id: 37.04
    priority: P1
    name: "Modules Enabled -> DB (ModuleRuntimeCatalog) + Backward compatible loader"
    problem:
      - "appsettings.Modules.Enabled is hard-coded and risky for scaling/ops."
    changes:
      sql:
        - file: "sql/01_core/078_tables_module_runtime.sql"
          change: |
            CREATE TABLE dbo.ModuleRuntimeCatalog (
              ModuleRuntimeId INT IDENTITY(1,1) PRIMARY KEY,
              ModuleKey NVARCHAR(100) NOT NULL,
              LoadHint NVARCHAR(400) NOT NULL, -- assembly name or type name
              IsEnabled BIT NOT NULL CONSTRAINT DF_ModuleRuntime_IsEnabled DEFAULT(1),
              Priority INT NOT NULL CONSTRAINT DF_ModuleRuntime_Priority DEFAULT(100),
              TenantId NVARCHAR(50) NULL,
              UpdatedAtUtc DATETIME2 NOT NULL CONSTRAINT DF_ModuleRuntime_UpdatedAt DEFAULT SYSUTCDATETIME()
            );
            CREATE INDEX IX_ModuleRuntimeCatalog_Enabled ON dbo.ModuleRuntimeCatalog(IsEnabled, Priority);

        - file: "sql/01_core/079_sps_module_runtime.sql"
          change: |
            CREATE OR ALTER PROC dbo.app_moduleruntime_list
              @TenantId NVARCHAR(50)=NULL
            AS
            BEGIN
              SET NOCOUNT ON;
              SELECT ModuleKey, LoadHint, Priority
              FROM dbo.ModuleRuntimeCatalog
              WHERE IsEnabled=1 AND (TenantId IS NULL OR TenantId=@TenantId)
              ORDER BY Priority ASC, ModuleKey ASC;
            END;

        - file: "sql/99_seed/014_seed_module_runtime.sql"
          change: |
            IF NOT EXISTS (SELECT 1 FROM dbo.ModuleRuntimeCatalog)
            BEGIN
              INSERT INTO dbo.ModuleRuntimeCatalog(ModuleKey, LoadHint, Priority)
              VALUES
                ('platform','TILSOFTAI.Modules.Platform',0),
                ('model','TILSOFTAI.Modules.Model',10),
                ('analytics','TILSOFTAI.Modules.Analytics',20);
            END;

      code:
        - file: "src/TILSOFTAI.Infrastructure/Modules/IModuleRuntimeCatalogProvider.cs"
          change: "New interface: GetEnabledModulesAsync(tenantId)"

        - file: "src/TILSOFTAI.Infrastructure/Modules/SqlModuleRuntimeCatalogProvider.cs"
          change: "Call dbo.app_moduleruntime_list via ISqlExecutor."

        - file: "src/TILSOFTAI.Infrastructure/Modules/ModuleLoaderHostedService.cs"
          change: |
            Prefer DB list:
              - var dbModules = provider.GetEnabledModulesAsync(ctxTenantIdOrNull)
              - if dbModules not empty -> load those
              - else fallback to ModulesOptions.Enabled (backward compatible)

        - file: "src/TILSOFTAI.Infrastructure/Modules/ModuleLoader.cs"
          change: |
            Backward compatible load:
              - Try Type.GetType(loadHint) as before
              - If null -> treat as assembly name:
                  Assembly.Load(loadHint)
                  find first ITilsoftModule implementation in that assembly
                  instantiate + register
            This makes existing "TILSOFTAI.Modules.X" hints valid.

      config:
        - file: "src/TILSOFTAI.Api/appsettings.json"
          change: |
            Remove "Modules:Enabled" OR keep only as emergency fallback in dev.
            Document: DB is source of truth for runtime module enablement.

    acceptance_criteria:
      - "When ModuleRuntimeCatalog has rows, appsettings.Modules.Enabled is not required."
      - "Toggling IsEnabled in DB affects module loading after restart (enterprise ops)."
      - "Loader supports both type-hint and assembly-hint."

  - id: 37.05
    priority: P0
    name: "Agent Test Protocol (repro + verification for the hang case)"
    tests:
      - name: "E2E: total models (typo tolerant)"
        steps:
          - "Run API with clean DB and seed scripts."
          - "POST /v1/chat/completions with message: 'tốn số models'"
          - "Verify logs: resolvedModules contains model (either initial or widened)."
          - "Verify outbound LLM request tools[] contains model_count."
          - "Verify tool call executed: model_count (SP ai_model_count)."
          - "Verify final response content is non-empty and includes the numeric total."
      - name: "Negative: empty assistant guard"
        steps:
          - "Temporarily disable model_count in ToolCatalog.IsEnabled=0"
          - "Ask 'tổng số models'"
          - "System must respond with explicit failure message (not empty), error code LLM_EMPTY_RESPONSE or a governed message."
    acceptance_criteria:
      - "No blank responses to client."
      - "No infinite loop; bounded retries."
      - "Observability contains correlation: ConversationId, ScopeAudit, Toolset counts."
