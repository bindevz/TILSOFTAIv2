patch_pack: 37
name: "Enterprise Module-Scale Stabilization (Tools/Modules/Streaming)"
priority: P0,P1
scope:
  - "Tool resolution & module scoping"
  - "Module activation from DB"
  - "Streaming reliability (never empty final)"
  - "Router instruction tuning (business-first)"

packs:

  - id: 37_01_sql_module_activation_catalog
    priority: P0
    goal: "Move Modules.Enabled out of appsettings into DB; support tenant/env enablement; cache safely."
    sql:
      - create_table: dbo.ModuleRuntimeCatalog
        ddl: |
          IF OBJECT_ID('dbo.ModuleRuntimeCatalog','U') IS NULL
          BEGIN
            CREATE TABLE dbo.ModuleRuntimeCatalog(
              ModuleKey      nvarchar(50) NOT NULL,
              AssemblyName   nvarchar(200) NOT NULL,
              IsEnabled      bit NOT NULL DEFAULT 1,
              Environment    nvarchar(50) NULL,        -- e.g. 'prod','staging'
              TenantId       nvarchar(50) NULL,
              Priority       int NOT NULL DEFAULT 100,
              CONSTRAINT PK_ModuleRuntimeCatalog PRIMARY KEY(ModuleKey, AssemblyName, ISNULL(Environment,''), ISNULL(TenantId,''))
            );
          END
      - create_sp: dbo.app_module_runtime_list
        ddl: |
          CREATE OR ALTER PROCEDURE dbo.app_module_runtime_list
            @TenantId nvarchar(50) = NULL,
            @Environment nvarchar(50) = NULL
          AS
          BEGIN
            SET NOCOUNT ON;

            ;WITH cte AS (
              SELECT
                ModuleKey, AssemblyName, IsEnabled, Priority,
                ROW_NUMBER() OVER (
                  PARTITION BY ModuleKey, AssemblyName
                  ORDER BY
                    CASE WHEN TenantId IS NOT NULL THEN 0 ELSE 1 END,
                    CASE WHEN Environment IS NOT NULL THEN 0 ELSE 1 END,
                    Priority ASC
                ) AS rn
              FROM dbo.ModuleRuntimeCatalog
              WHERE IsEnabled = 1
                AND (@TenantId IS NULL OR TenantId IS NULL OR TenantId = @TenantId)
                AND (@Environment IS NULL OR Environment IS NULL OR Environment = @Environment)
            )
            SELECT ModuleKey, AssemblyName, Priority
            FROM cte
            WHERE rn = 1
            ORDER BY Priority ASC;
          END
      - seed_example:
          note: "Seed baseline modules (platform/model/analytics) once per env"
          dml: |
            DELETE FROM dbo.ModuleRuntimeCatalog WHERE TenantId IS NULL AND Environment IS NULL;

            INSERT INTO dbo.ModuleRuntimeCatalog(ModuleKey, AssemblyName, IsEnabled, Environment, TenantId, Priority)
            VALUES
              ('platform','TILSOFTAI.Modules.Platform',1,NULL,NULL,0),
              ('model','TILSOFTAI.Modules.Model',1,NULL,NULL,10),
              ('analytics','TILSOFTAI.Modules.Analytics',1,NULL,NULL,20);

    csharp:
      - add: "IModuleActivationProvider + SqlModuleActivationProvider"
      - update: "ModuleLoaderHostedService to load enabled assemblies via DB (fallback to config if DB unavailable)"
      - remove_from_appsettings:
          - "Modules:Enabled"

    acceptance:
      - "App boots with modules loaded from DB (prod/staging/tenant aware)."
      - "If DB unavailable at startup: fallback to safe default modules (platform only OR cached last-known-good)."
      - "No module list hard-coded in appsettings (except minimal bootstrap fallback)."


  - id: 37_02_tools_sql_backed_registry_contract
    priority: P0
    goal: "Fix scoped tool resolution by decoupling allowlist (code) from schema/instruction (SQL)."
    design:
      - problem: "AnalyticsModule registers handlers only -> ToolRegistry has no tool names -> ToolCatalogSyncService cannot emit analytics tools."
      - solution: "Introduce SQL-backed tool registration (stub allowlist) without hardcoding schema/instruction in code."
      - approach: "Extend ToolDefinition with IsSqlBacked flag; ToolRegistry allows empty Instruction/JsonSchema only when IsSqlBacked=true."

    csharp:
      - update_file: "src/TILSOFTAI.Orchestration/Tools/ToolDefinition.cs"
        change: "Add bool IsSqlBacked {get;set;} default false"
      - update_file: "src/TILSOFTAI.Orchestration/Tools/ToolRegistry.cs"
        change:
          - "If IsSqlBacked==true: do NOT require Instruction/JsonSchema at Register() time"
          - "Still require Name + SpName (ai_) + Module + IsEnabled"
      - update_file: "src/TILSOFTAI.Infrastructure/Tools/ToolCatalogSyncService.cs"
        change:
          - "In Merge(): if moduleTool.IsSqlBacked and SQL lacks Instruction/JsonSchema -> return null (hard fail; never fallback to empty)"
      - update_file: "src/TILSOFTAI.Modules.Analytics/AnalyticsModule.cs"
        change:
          - "Register SQL-backed stubs into toolRegistry for: catalog_search, catalog_get_dataset, analytics_validate_plan, analytics_execute_plan"
          - "Keep handlerRegistry registration as-is"
        example_stub:
          - name: "catalog_search"
            sp: "ai_catalog_search"
            module: "Analytics"
            isSqlBacked: true

    sql:
      - must_apply_seeds:
          - "sql/99_seed/analytics/001_seed_toolcatalog_analytics.sql"
          - "sql/99_seed/010_seed_module_scope.sql (ToolCatalogScope + MetadataDictionaryScope + ModuleCatalog)"
      - add_diagnostics_rule: "platform/module_scope_health"
        checks:
          - "ToolCatalog contains expected analytics tools"
          - "ToolCatalogScope includes mappings for model/analytics/platform"
          - "ModuleCatalog not empty for current language"

    acceptance:
      - "ScopedToolsResolved for modules=['analytics'] returns analytics tools (>=4) + platform tools."
      - "tool.list returns analytics tools as enabled tools."
      - "No duplication of schema/instruction hard-coded in Analytics module."


  - id: 37_03_router_business_tuning_model_count
    priority: P0
    goal: "Router selects 'model' module for model-count questions (business-first)."
    sql:
      - update_seed_or_datafix: "dbo.ModuleCatalog (instruction text)"
        change:
          - module: "model"
            add: "Include queries about total model count, season model count, how many models."
          - module: "analytics"
            add: "Use for cross-domain aggregations; prefer domain module if a dedicated tool exists (e.g., model_count)."
      - optional: "Add small examples in instruction for 'tổng số models' -> model"

    acceptance:
      - "Query: 'tổng số models' -> ModuleScopeResolved includes 'model' (or ['model','analytics'] if you want redundancy)."
      - "Scoped toolset includes model_count so LLM can actually call it."


  - id: 37_04_streaming_never_empty_final
    priority: P1
    goal: "Prevent empty final responses in stream mode; keep enterprise UX stable."
    csharp:
      - update_file: "src/TILSOFTAI.Orchestration/Pipeline/ChatPipeline.cs"
        change:
          - "In CompleteViaStreamAsync(): if stream ended with Content=='' AND ToolCalls.Count==0 => fallback to non-stream CompleteAsync once, then emit Final(content)."
          - "Additionally: if fallback still empty -> emit a safe error envelope (not empty string)."
      - optional_hardening:
          - "Extend OpenAiResponseParser to parse delta.reasoning into a separate event type (do NOT show to end-user by default)."

    acceptance:
      - "Streaming never returns Final('') (empty)."
      - "When model streams reasoning-only, system still returns a user-visible final answer or a structured error."


  - id: 37_05_test_protocol_agent
    priority: P0
    goal: "Provide deterministic test steps for Agent to validate end-to-end ReAct + module scoping."
    test_cases:
      - name: "TC01_total_models"
        input: "tổng số models"
        expected:
          - "ModuleScopeResolved => includes model"
          - "tools[] contains model_count"
          - "LLM issues tool_call model_count"
          - "ToolExecuted model_count returns count"
          - "Assistant final includes numeric count and season context if present"
      - name: "TC02_model_details"
        input: "phân tích model với ID 3"
        expected:
          - "LLM calls model_get_overview(3)"
          - "FollowUpRules: if PieceCount>0 -> model_get_pieces"
          - "If packaging requested -> model_get_packaging"
      - name: "TC03_analytics_catalog_discovery"
        input: "đếm số model theo season và top 5 season"
        expected:
          - "ModuleScopeResolved => analytics (and/or model)"
          - "LLM calls catalog_search first (analytics)"
          - "If no dataset catalog seeded -> returns graceful explanation + diagnostics suggestion"

    observability:
      - "Verify DB tables: ConversationMessage, ToolExecution, ErrorLog have entries for each step."
      - "Verify logs contain: ModuleScopeResolved, ScopedToolsResolved, ToolExecuted, PipelineCompleted."